<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --toolbar-h: 80px;
    --activitybar-h: 30px;
    --stylebar-h: 44px;
    --accent: #7b5cd0;
    --accent-light: #e0d8f4;
    --teal: #1ba599;
    --teal-light: #3bbaab;
    --navy: #212856;
    --navy-light: #2b3472;
    --navy-hover: #363d85;
    --danger: #ef4444;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'Lexend', sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: var(--font-body);
    overflow: hidden;
    background: #eee;
  }

  /* ---------- Toolbar ---------- */
  #toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--toolbar-h);
    background: var(--navy);
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 16px;
    z-index: 10000;
    box-shadow: 0 2px 0 rgba(123,92,208,0.2), 0 4px 24px rgba(0,0,0,0.5);
    overflow-x: auto;
    overflow-y: hidden;
  }
  #toolbar .title {
    color: #fff;
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 22px;
    margin-right: 6px;
    letter-spacing: 1.5px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #toolbar button {
    background: var(--navy-light);
    color: var(--accent-light);
    border: 1px solid rgba(224,216,244,0.18);
    padding: 7px 13px;
    border-radius: 9px;
    cursor: pointer;
    font-size: 13px;
    font-family: var(--font-body);
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
    height: 40px;
    font-weight: 500;
  }
  #toolbar button:hover { background: var(--navy-hover); border-color: rgba(224,216,244,0.35); color: #fff; }
  #toolbar button:disabled { opacity: 0.28; cursor: default; }
  #toolbar button:disabled:hover { background: var(--navy-light); border-color: rgba(224,216,244,0.18); color: var(--accent-light); }
  #toolbar button.active { background: var(--accent); border-color: rgba(224,216,244,0.3); color: #fff; box-shadow: 0 0 0 2px rgba(123,92,208,0.4); }
  #toolbar button#toggleDraw.active { background: var(--teal); border-color: rgba(59,186,171,0.4); box-shadow: 0 0 0 2px rgba(27,165,153,0.4); }
  #toolbar button#toggleEraser.active { background: #d04040; border-color: rgba(239,68,68,0.4); box-shadow: 0 0 0 2px rgba(239,68,68,0.4); }
  #toolbar button.danger-btn {
    background: rgba(239,68,68,0.15);
    border-color: rgba(239,68,68,0.35);
    color: #fca5a5;
  }
  #toolbar button.danger-btn:hover {
    background: rgba(239,68,68,0.28);
    border-color: rgba(239,68,68,0.6);
    color: #fff;
  }
  #toolbar .btn-group {
    display: flex;
    flex-shrink: 0;
  }
  #toolbar .btn-group button:first-child {
    border-top-right-radius: 0;
    border-bottom-right-radius: 0;
  }
  #toolbar .btn-group button:last-child {
    border-top-left-radius: 0;
    border-bottom-left-radius: 0;
    border-left: none;
  }
  #toolbar .btn-group.bg-group {
    align-items: center;
    background: var(--navy-light);
    border: 1px solid rgba(224,216,244,0.18);
    border-radius: 9px;
    padding: 0 6px 0 12px;
    gap: 4px;
    height: 40px;
  }
  #toolbar .btn-group.bg-group .color-label { padding: 0; }
  #toolbar .btn-group.bg-group button {
    border-radius: 7px;
    background: transparent;
    border: none;
    height: 30px;
  }
  #toolbar .btn-group.bg-group button:hover { background: rgba(224,216,244,0.1); border: none; }
  #toolbar input[type="color"] {
    width: 28px; height: 28px;
    border: none; border-radius: 7px;
    cursor: pointer;
    background: none;
    padding: 0;
    flex-shrink: 0;
  }
  #toolbar .color-label {
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--accent-light);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #toolbar select, #toolbar input[type="number"] {
    background: var(--navy-light);
    color: var(--accent-light);
    border: 1px solid rgba(224,216,244,0.18);
    border-radius: 9px;
    padding: 5px 8px;
    font-size: 13px;
    cursor: pointer;
    flex-shrink: 0;
    height: 40px;
  }
  #toolbar input[type="number"] { width: 54px; cursor: text; }
  #toolbar select:disabled, #toolbar input[type="number"]:disabled {
    opacity: 0.28; cursor: default;
  }
  #toolbar input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 80px;
    height: 4px;
    background: rgba(224,216,244,0.18);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    flex-shrink: 0;
    padding: 0;
    border: none;
  }
  #toolbar input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    background: var(--accent-light);
    border-radius: 50%;
    cursor: pointer;
  }
  #toolbar input[type="range"]::-moz-range-thumb {
    width: 14px; height: 14px;
    background: var(--accent-light);
    border-radius: 50%;
    cursor: pointer;
    border: none;
  }
  .size-control {
    display: flex;
    align-items: center;
    gap: 7px;
    flex-shrink: 0;
  }
  #sizePreview {
    border-radius: 50%;
    background: #fff;
    flex-shrink: 0;
    transition: width 0.08s, height 0.08s, background 0.15s;
    pointer-events: none;
  }

  /* ---------- Labeled field groups (shared by toolbar + stylebar) ---------- */
  :is(#toolbar, #styleBar) .field-group {
    display: flex;
    align-items: stretch;
    flex-shrink: 0;
    background: rgba(224,216,244,0.1);
    border: 1px solid rgba(224,216,244,0.3);
    border-radius: 9px;
    height: 36px;
    transition: opacity 0.15s;
    overflow: hidden;
  }
  :is(#toolbar, #styleBar) .field-group.disabled { opacity: 0.35; pointer-events: none; }
  :is(#toolbar, #styleBar) .field-group .field {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 11px;
  }
  :is(#toolbar, #styleBar) .field-group .field:not(:last-child) {
    border-right: 1px solid rgba(224,216,244,0.2);
  }
  :is(#toolbar, #styleBar) .field-group .field-label {
    color: var(--teal-light);
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 0.8px;
    white-space: nowrap;
  }
  :is(#toolbar, #styleBar) .field-group select,
  :is(#toolbar, #styleBar) .field-group input[type="number"] {
    background: transparent;
    border: none;
    padding: 0;
    border-radius: 0;
    height: auto;
    color: #fff;
    font-family: var(--font-body);
  }
  :is(#toolbar, #styleBar) .field-group input[type="color"] { width: 22px; height: 22px; }

  /* ---------- Style bar ---------- */
  #styleBar {
    position: fixed;
    top: calc(var(--toolbar-h) + var(--activitybar-h));
    left: 0; right: 0;
    height: var(--stylebar-h);
    background: #1c2262;
    border-bottom: 1px solid rgba(123,92,208,0.3);
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 16px;
    z-index: 9998;
    transform: translateY(-100%);
    opacity: 0;
    transition: transform 0.18s ease, opacity 0.15s ease;
    pointer-events: none;
    overflow-x: auto;
    overflow-y: hidden;
  }
  #styleBar.active {
    transform: translateY(0);
    opacity: 1;
    pointer-events: auto;
  }
  #styleBar .style-label {
    color: rgba(224,216,244,0.35);
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 1.2px;
    white-space: nowrap;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  #styleBar .style-divider {
    width: 1px; height: 20px;
    background: rgba(123,92,208,0.3);
    flex-shrink: 0;
  }
  body.stylebar-open #viewport {
    top: calc(var(--toolbar-h) + var(--activitybar-h) + var(--stylebar-h));
  }
  #viewport { transition: top 0.18s ease; }

  /* ---------- Sticky split button ---------- */
  .sticky-btn-wrap {
    display: flex;
    flex-shrink: 0;
  }
  .sticky-btn-wrap #addSticky {
    border-top-right-radius: 0;
    border-bottom-right-radius: 0;
  }
  .sticky-color-swatch-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 40px;
    width: 30px;
    background: var(--navy-light);
    border: 1px solid rgba(224,216,244,0.18);
    border-left: none;
    border-top-right-radius: 9px;
    border-bottom-right-radius: 9px;
    cursor: pointer;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
    transition: background 0.15s;
  }
  .sticky-color-swatch-btn:hover { background: var(--navy-hover); }
  #stickyColorSwatch {
    width: 13px; height: 13px;
    border-radius: 50%;
    background: #fff59d;
    border: 1.5px solid rgba(255,255,255,0.35);
    pointer-events: none;
    flex-shrink: 0;
  }
  .sticky-color-swatch-btn input[type="color"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%; height: 100%;
  }

  /* ---------- Toolbar sections ---------- */
  #toolbar .toolbar-section {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  #toolbar .section-label {
    color: var(--teal-light);
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 1.2px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #toolbar .toolbar-divider {
    width: 1px;
    align-self: stretch;
    margin: 14px 6px;
    background: rgba(59,186,171,0.25);
    flex-shrink: 0;
  }
  #toolbar .spacer { flex: 1 0 8px; }
  #toolbar .zoom-label {
    color: var(--accent-light);
    font-size: 13px;
    font-weight: 500;
    min-width: 44px;
    text-align: center;
    flex-shrink: 0;
    cursor: pointer;
    border-radius: 7px;
    padding: 3px 6px;
    transition: background 0.15s, color 0.15s;
  }
  #toolbar .zoom-label:hover { background: var(--navy-light); color: #fff; }
  #fileInput, #bgImageInput { display: none; }

  /* ---------- Activity bar ---------- */
  #activityBar {
    position: fixed;
    top: var(--toolbar-h);
    left: 0; right: 0;
    height: var(--activitybar-h);
    background: #1a2050;
    border-bottom: 1px solid rgba(123,92,208,0.2);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 14px;
    z-index: 9999;
  }
  .activity-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: rgba(224,216,244,0.4);
    white-space: nowrap;
  }
  .activity-chip .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(224,216,244,0.2);
    flex-shrink: 0;
  }
  .activity-chip.active { color: rgba(224,216,244,0.9); }
  .activity-chip.active .dot { background: var(--accent); }
  .activity-chip.draw-active .dot { background: var(--teal); }
  .activity-chip.erase-active .dot { background: #ef4444; }
  .activity-chip.selected-active .dot { background: var(--teal); }
  #activityBar .activity-divider {
    width: 1px; height: 14px;
    background: rgba(123,92,208,0.25);
    flex-shrink: 0;
  }
  #activityHint {
    font-size: 11px;
    color: rgba(224,216,244,0.25);
    margin-left: auto;
  }

  /* ---------- Confirm modal ---------- */
  #confirmModal {
    position: fixed;
    inset: 0;
    z-index: 99999;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  #confirmModal.hidden { display: none; }
  .modal-box {
    background: #1a2050;
    border: 1px solid rgba(123,92,208,0.3);
    border-radius: 14px;
    padding: 28px 28px 22px;
    width: 340px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .modal-icon { font-size: 28px; margin-bottom: 10px; }
  .modal-title {
    color: #fff;
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 1px;
    margin: 0 0 6px;
  }
  .modal-message {
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    margin: 0 0 22px;
    line-height: 1.5;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .modal-actions button {
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .modal-actions .modal-cancel {
    background: rgba(224,216,244,0.08);
    color: rgba(224,216,244,0.7);
  }
  .modal-actions .modal-cancel:hover { background: rgba(224,216,244,0.16); color: #fff; }
  .modal-actions .modal-confirm {
    background: var(--danger);
    color: #fff;
  }
  .modal-actions .modal-confirm:hover { background: #dc2626; }

  /* ---------- Checklist drawer ---------- */
  #checklistDrawer {
    position: fixed;
    left: 12px; bottom: 0;
    width: 300px;
    z-index: 9999;
    background: rgba(26, 32, 80, 0.55);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(123,92,208,0.3);
    border-bottom: none;
    border-radius: 12px 12px 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.4);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #checklistHandle {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 11px 14px;
    background: transparent;
    color: #fff;
    border: none;
    cursor: pointer;
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 17px;
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  #checklistHandle:hover { background: rgba(255,255,255,0.06); }
  #checklistHandle .arrow {
    display: inline-block;
    transition: transform 0.2s ease;
    color: rgba(255,255,255,0.4);
    font-size: 11px;
  }
  #checklistDrawer.open #checklistHandle .arrow { transform: rotate(180deg); }
  #checklistProgressText {
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    margin-left: auto;
  }
  #checklistProgressBar {
    height: 3px;
    margin: 0 14px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
  }
  #checklistProgressFill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--teal));
    border-radius: 4px;
    transition: width 0.25s ease;
  }
  #checklistBody {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease;
  }
  #checklistDrawer.open #checklistBody {
    max-height: 55vh;
    overflow-y: auto;
  }
  #checklistItems {
    list-style: none;
    margin: 8px 0 0;
    padding: 0;
  }
  #checklistItems li {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 14px;
    font-size: 13px;
    color: #fff;
  }
  #checklistItems li:hover { background: rgba(255,255,255,0.05); }
  #checklistItems li.checked span { text-decoration: line-through; color: rgba(255,255,255,0.35); }
  #checklistItems input[type="checkbox"] { flex-shrink: 0; cursor: pointer; accent-color: var(--teal); }
  #checklistItems span { flex: 1; line-height: 1.3; }
  #checklistItems .item-edit-input {
    flex: 1;
    background: rgba(123,92,208,0.12);
    border: 1px solid var(--accent);
    border-radius: 6px;
    color: #fff;
    font-size: 13px;
    padding: 3px 7px;
    outline: none;
  }
  .checklist-item-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.25);
    padding: 2px 4px;
    border-radius: 4px;
    font-size: 12px;
    line-height: 1;
    flex-shrink: 0;
    transition: color 0.15s, background 0.15s;
    display: none;
  }
  #checklistItems li:hover .checklist-item-btn { display: inline-flex; }
  .checklist-item-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }
  .checklist-item-btn.delete:hover { color: #f87171; }
  #checklistAddRow {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px 12px;
    border-top: 1px solid rgba(255,255,255,0.07);
    margin-top: 4px;
  }
  #checklistAddInput {
    flex: 1;
    background: rgba(123,92,208,0.1);
    border: 1px solid rgba(224,216,244,0.15);
    border-radius: 8px;
    color: #fff;
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  #checklistAddInput:focus { border-color: var(--accent); }
  #checklistAddInput::placeholder { color: rgba(224,216,244,0.3); }
  #checklistAddBtn {
    background: var(--teal);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 12px;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  #checklistAddBtn:hover { background: #159080; }

  /* ---------- Canvas viewport ---------- */
  #viewport {
    position: absolute;
    top: calc(var(--toolbar-h) + var(--activitybar-h));
    left: 0; right: 0; bottom: 0;
    overflow: auto;
    background: #dcd7ca;
  }
  #viewport.custom-bg {
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
  }
  #canvas {
    position: relative;
    width: 3000px;
    height: 2000px;
    transform-origin: 0 0;
  }
  #drawCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 3000px; height: 2000px;
    z-index: 99999;
    pointer-events: none;
    touch-action: none;
  }
  #drawCanvas.active { pointer-events: auto; cursor: crosshair; }
  #drawCanvas.active.hide-cursor { cursor: none; }

  /* Text cursor inside sticky/text content */
  .item .content { cursor: text; }

  /* Custom draw cursor circle */
  #drawCursor {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    z-index: 99998;
    display: none;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.35);
    transition: width 0.08s, height 0.08s;
  }

  /* ---------- Items ---------- */
  .item {
    position: absolute;
    cursor: grab;
    user-select: none;
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    border-radius: 10px;
  }
  .item.dragging { cursor: grabbing; z-index: 9999 !important; opacity: 0.95; }
  .item.selected { box-shadow: 0 0 0 3px var(--accent), 0 4px 14px rgba(0,0,0,0.15); }
  /* ---------- Context menu ---------- */
  #ctxMenu {
    position: fixed;
    z-index: 99998;
    background: rgba(26,32,80,0.97);
    border: 1px solid rgba(123,92,208,0.4);
    border-radius: 10px;
    padding: 5px;
    min-width: 160px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    backdrop-filter: blur(10px);
    display: none;
  }
  #ctxMenu.visible { display: block; }
  .ctx-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    border-radius: 7px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent-light);
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  .ctx-item:hover { background: rgba(224,216,244,0.1); color: #fff; }
  .ctx-item.danger:hover { background: rgba(239,68,68,0.18); color: #fca5a5; }
  .ctx-divider { height: 1px; background: rgba(224,216,244,0.1); margin: 4px 0; }

  /* 8-direction resize handles */
  .item .rh {
    position: absolute;
    width: 10px; height: 10px;
    background: #fff;
    border: 1.5px solid var(--accent);
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 4;
  }
  .item:hover .rh, .item.selected .rh { opacity: 1; }
  .rh[data-dir="nw"] { top: -5px; left: -5px; cursor: nw-resize; }
  .rh[data-dir="n"]  { top: -5px; left: calc(50% - 5px); cursor: n-resize; }
  .rh[data-dir="ne"] { top: -5px; right: -5px; cursor: ne-resize; }
  .rh[data-dir="e"]  { top: calc(50% - 5px); right: -5px; cursor: e-resize; }
  .rh[data-dir="se"] { bottom: -5px; right: -5px; cursor: se-resize; }
  .rh[data-dir="s"]  { bottom: -5px; left: calc(50% - 5px); cursor: s-resize; }
  .rh[data-dir="sw"] { bottom: -5px; left: -5px; cursor: sw-resize; }
  .rh[data-dir="w"]  { top: calc(50% - 5px); left: -5px; cursor: w-resize; }
  .content {
    position: absolute;
    inset: 0;
    box-sizing: border-box;
    border-radius: 10px;
  }
  .sticky {
    padding: 16px;
    font-size: 15px;
    line-height: 1.4;
    overflow: auto;
    outline: none;
    word-wrap: break-word;
    user-select: text;
  }
  .sticky:empty::before { content: "Type something..."; opacity: 0.45; }
  .text-item {
    background: #ffffff;
    border: 1px solid #d8d4c8;
    padding: 10px 12px;
    outline: none;
    word-wrap: break-word;
    overflow: auto;
    color: #222;
    user-select: text;
  }
  .text-item:empty::before { content: "Type here..."; opacity: 0.4; }
  .image-item { overflow: hidden; background: #fff; }
  .image-item img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }

  /* ---------- Minimap ---------- */
  #minimap {
    position: fixed;
    bottom: 16px; right: 16px;
    width: 200px; height: 133px;
    border-radius: 10px;
    border: 1px solid rgba(123,92,208,0.35);
    background: rgba(26,32,80,0.75);
    backdrop-filter: blur(8px);
    z-index: 9998;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.35);
    transition: height 0.2s ease;
  }
  #minimap.minimized { height: 26px; }
  #minimap.minimized #minimapCanvas { display: none; }
  #minimapCanvas { display: block; width: 200px; height: 133px; }
  #minimapLabel {
    position: absolute;
    top: 5px; left: 8px;
    font-family: var(--font-display);
    font-size: 11px;
    letter-spacing: 0.8px;
    color: rgba(224,216,244,0.5);
    pointer-events: none;
  }
  #minimapToggle {
    position: absolute;
    top: 3px; right: 5px;
    background: none;
    border: none;
    color: rgba(224,216,244,0.45);
    font-size: 13px;
    cursor: pointer;
    padding: 2px 5px;
    border-radius: 4px;
    line-height: 1;
    z-index: 1;
    font-family: var(--font-body);
  }
  #minimapToggle:hover { color: #fff; background: rgba(255,255,255,0.1); }
</style>
</head>
<body>

<!-- ── Context Menu ── -->
<div id="ctxMenu">
  <div class="ctx-item" id="ctxDuplicate">⧉ Duplicate</div>
  <div class="ctx-divider"></div>

</div>

<!-- ── Toolbar ── -->
<div id="toolbar">
  <div class="title">Vision Board</div>

  <div class="toolbar-section">
    <button id="undoBtn" title="Undo (Ctrl/Cmd+Z)">↩ Undo</button>
    <button id="redoBtn" title="Redo (Ctrl/Cmd+Shift+Z)">↪ Redo</button>

  <div class="toolbar-divider"></div>

  <div class="toolbar-section">

    <div class="sticky-btn-wrap">

      <label class="sticky-color-swatch-btn" title="Sticky color">

  <div class="toolbar-divider"></div>

  <div class="toolbar-section">
    <span class="section-label">Draw</span>

    <input type="color" id="penColor" value="#ff3b30" title="Pen color">

  <div id="canvas">
    <canvas id="drawCanvas"></canvas>

<script>
(() => {
  const canvas = document.getElementById('canvas');
  const viewport = document.getElementById('viewport');
  const STORAGE_KEY = 'visionBoardState_v1';
  const CHECKLIST_STORAGE_KEY = 'visionBoardChecklist_v2';
  const CHECKLIST_ITEMS_KEY = 'visionBoardChecklistItems_v1';

  const DEFAULT_CHECKLIST_ITEMS = [
    'Academic field of interest',
    'Hobbies (2-3)',
    'Future plans',
    'College of interest',
    'Future lifestyle',
    'Social life',
    'Extracurriculars',
  ];

  let checklistItems = [...DEFAULT_CHECKLIST_ITEMS];
  let checklistChecked = {};

  let items = [];
  let nextZ = 1;
  let scale = 1;
  let selectedId = null;
  let bgColor = '#dcd7ca';
  let bgImage = null;
  let strokes = [];
  let history = [];
  let historyIndex = -1;
  const MAX_HISTORY = 100;

  function uid() { return 'i' + Math.random().toString(36).slice(2, 10); }

  // ---------- Confirm modal ----------
  let modalCallback = null;

  function showConfirm({ icon = '⚠️', title, message, confirmLabel = 'Confirm' }, onConfirm) {
    document.getElementById('modalIcon').textContent = icon;
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalMessage').textContent = message;
    document.getElementById('modalConfirm').textContent = confirmLabel;
    document.getElementById('confirmModal').classList.remove('hidden');
    modalCallback = onConfirm;
  }

  document.getElementById('modalCancel').addEventListener('click', () => {
    document.getElementById('confirmModal').classList.add('hidden');
    modalCallback = null;
  });

  document.getElementById('modalConfirm').addEventListener('click', () => {
    document.getElementById('confirmModal').classList.add('hidden');
    if (modalCallback) { modalCallback(); modalCallback = null; }
  });

  document.getElementById('confirmModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('confirmModal')) {
      document.getElementById('confirmModal').classList.add('hidden');
      modalCallback = null;
    }
  });

  // ---------- Save / load ----------
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ items, nextZ, bgColor, bgImage, strokes }));
  }

  function applyBackground() {
    viewport.style.backgroundColor = bgColor;
    document.getElementById('bgColor').value = bgColor;
    if (bgImage) {
      viewport.style.backgroundImage = `url("${bgImage}")`;
      viewport.classList.add('custom-bg');
    } else {
      viewport.style.backgroundImage = '';
      viewport.classList.remove('custom-bg');
    }
    document.getElementById('removeBgImageBtn').disabled = !bgImage;
  }

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      items = data.items || [];
      nextZ = data.nextZ || 1;
      bgColor = data.bgColor || bgColor;
      bgImage = data.bgImage || null;
      strokes = data.strokes || [];
      items.forEach(renderItem);
      redrawStrokes();
    } catch (e) { console.error('Failed to load board state', e); }
  }

  // ---------- Undo / redo ----------
  function snapshot() {
    return JSON.parse(JSON.stringify({ items, nextZ, bgColor, bgImage, strokes }));
  }

  function pushHistory() {
    history = history.slice(0, historyIndex + 1);
    history.push(snapshot());
    if (history.length > MAX_HISTORY) history.shift();
    historyIndex = history.length - 1;
    updateUndoRedoButtons();
  }

  function commit() { save(); pushHistory(); updateMinimap(); }

  function renderAll() {
    canvas.querySelectorAll('.item').forEach(el => el.remove());
    deselectAll();
    items.forEach(renderItem);
  }

  function applyState(state) {
    items = JSON.parse(JSON.stringify(state.items));
    nextZ = state.nextZ;
    bgColor = state.bgColor || '#dcd7ca';
    bgImage = state.bgImage || null;
    strokes = JSON.parse(JSON.stringify(state.strokes || []));
    renderAll();
    applyBackground();
    redrawStrokes();
    updateMinimap();
    save();
  }

  function undo() {
    if (historyIndex <= 0) return;
    historyIndex--;
    applyState(history[historyIndex]);
    updateUndoRedoButtons();
  }

  function redo() {
    if (historyIndex >= history.length - 1) return;
    historyIndex++;
    applyState(history[historyIndex]);
    updateUndoRedoButtons();
  }

  function updateUndoRedoButtons() {
    document.getElementById('undoBtn').disabled = historyIndex <= 0;
    document.getElementById('redoBtn').disabled = historyIndex >= history.length - 1;
  }

  // ---------- Activity bar ----------
  let drawMode = false;
  let eraseMode = false;

  function updateActivityBar() {
    const chipMode = document.getElementById('chipMode');
    const chipModeText = document.getElementById('chipModeText');
    const chipSelected = document.getElementById('chipSelected');
    const chipSelectedText = document.getElementById('chipSelectedText');

    chipMode.className = 'activity-chip';
    if (eraseMode) {
      chipMode.classList.add('active', 'erase-active');
      chipModeText.textContent = 'Erase Mode';
    } else if (drawMode) {
      chipMode.classList.add('active', 'draw-active');
      chipModeText.textContent = 'Draw Mode';
    } else {
      chipMode.classList.add('active');
      chipModeText.textContent = 'Select Mode';
    }

    chipSelected.className = 'activity-chip';
    if (selectedId) {
      const item = items.find(i => i.id === selectedId);
      if (item) {
        chipSelected.classList.add('active', 'selected-active');
        const label = item.type === 'sticky' ? 'Sticky Note' : item.type === 'text' ? 'Text Box' : 'Image';
        chipSelectedText.textContent = `${label} selected`;
      }
    } else {
      chipSelectedText.textContent = 'Nothing selected';
    }
  }

  // ---------- Selection ----------
  function bringToFront(el, item) {
    item.z = nextZ++;
    el.style.zIndex = item.z;
    save();
  }

  function selectItem(id) {
    selectedId = id;
    canvas.querySelectorAll('.item.selected').forEach(e => e.classList.remove('selected'));
    const el = canvas.querySelector(`[data-id="${id}"]`);
    if (el) el.classList.add('selected');
    updateFormatControls();
    updateActivityBar();
  }

  function deselectAll() {
    selectedId = null;
    canvas.querySelectorAll('.item.selected').forEach(e => e.classList.remove('selected'));
    updateFormatControls();
    updateActivityBar();
  }

  function defaultFontSize(type) { return type === 'sticky' ? 15 : 16; }

  const styleBar = document.getElementById('styleBar');

  function updateFormatControls() {
    const fontFamilySelect = document.getElementById('fontFamily');
    const fontSizeInput = document.getElementById('fontSizeInput');
    const borderColorInput = document.getElementById('borderColor');
    const borderWidthInput = document.getElementById('borderWidthInput');
    const fillColorInput = document.getElementById('itemFillColor');
    const item = items.find(i => i.id === selectedId);
    const isText = item && ['sticky', 'text'].includes(item.type);

    // Show/hide style bar
    styleBar.classList.toggle('active', !!item);
    document.body.classList.toggle('stylebar-open', !!item);

    fontFamilySelect.disabled = !isText;
    fontSizeInput.disabled = !isText;
    fontFamilySelect.value = isText ? (item.fontFamily || 'inherit') : 'inherit';
    fontSizeInput.value = isText ? (item.fontSize || defaultFontSize(item.type)) : '';
    document.getElementById('textFieldGroup').classList.toggle('disabled', !isText);
    borderColorInput.disabled = !item;
    borderWidthInput.disabled = !item;
    borderColorInput.value = item ? (item.borderColor || '#000000') : '#000000';
    borderWidthInput.value = item ? (item.borderWidth || 0) : '';
    document.getElementById('borderFieldGroup').classList.toggle('disabled', !item);
    fillColorInput.disabled = !isText;
    if (isText) {
      fillColorInput.value = item.type === 'sticky'
        ? (item.color || '#fff59d')
        : (item.bgColor || '#ffffff');
    }
    document.getElementById('fillFieldGroup').classList.toggle('disabled', !isText);
    const textColorInput = document.getElementById('itemTextColor');
    textColorInput.disabled = !isText;
    if (isText) textColorInput.value = item.textColor || '#000000';
  }

  function borderStyleFor(item) {
    return item.borderWidth > 0 ? `${item.borderWidth}px solid ${item.borderColor || '#000000'}` : 'none';
  }

  function removeItemById(id) {
    const el = canvas.querySelector(`[data-id="${id}"]`);
    if (el) el.remove();
    items = items.filter(i => i.id !== id);
    if (selectedId === id) { selectedId = null; updateFormatControls(); updateActivityBar(); }
    commit();
  }

  let snapGrid = false;
  const GRID = 22;
  function snap(v) { return snapGrid ? Math.round(v / GRID) * GRID : v; }

  // ---------- Context menu ----------
  const ctxMenu = document.getElementById('ctxMenu');
  let ctxTargetId = null;

  function showCtxMenu(x, y, id) {
    ctxTargetId = id;
    ctxMenu.style.left = x + 'px';
    ctxMenu.style.top  = y + 'px';
    ctxMenu.classList.add('visible');
  }

  function hideCtxMenu() {
    ctxMenu.classList.remove('visible');
    ctxTargetId = null;
  }

  document.getElementById('ctxDuplicate').addEventListener('click', () => {
    if (ctxTargetId) duplicateItem(ctxTargetId);
    hideCtxMenu();
  });

  document.getElementById('ctxDelete').addEventListener('click', () => {
    if (ctxTargetId) removeItemById(ctxTargetId);
    hideCtxMenu();
  });

  document.addEventListener('click', (e) => {
    if (!ctxMenu.contains(e.target)) hideCtxMenu();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') hideCtxMenu();
  }, true);

  function duplicateItem(id) {
    const src = items.find(i => i.id === id);
    if (!src) return;
    const copy = JSON.parse(JSON.stringify(src));
    copy.id = uid();
    copy.x += GRID * 2;
    copy.y += GRID * 2;
    copy.z = nextZ++;
    items.push(copy);
    const el = renderItem(copy);
    selectItem(copy.id);
    commit();
  }

  function makeResizeHandles(el, item) {
    ['nw','n','ne','e','se','s','sw','w'].forEach(dir => {
      const h = document.createElement('div');
      h.className = 'rh';
      h.dataset.dir = dir;
      el.appendChild(h);
      h.addEventListener('mousedown', e => {
        e.stopPropagation(); e.preventDefault();
        bringToFront(el, item);
        const startX = e.clientX, startY = e.clientY;
        const sx = item.x, sy = item.y, sw = item.w, sh = item.h;
        function onMove(ev) {
          const dx = (ev.clientX - startX) / scale;
          const dy = (ev.clientY - startY) / scale;
          if (dir.includes('e')) item.w = Math.max(60, sw + dx);
          if (dir.includes('s')) item.h = Math.max(40, sh + dy);
          if (dir.includes('w')) {
            const nw = Math.max(60, sw - dx);
            item.x = snap(sx + (sw - nw)); item.w = nw;
          }
          if (dir.includes('n')) {
            const nh = Math.max(40, sh - dy);
            item.y = snap(sy + (sh - nh)); item.h = nh;
          }
          if (!dir.includes('w')) item.w = snap(item.w);
          if (!dir.includes('n')) item.h = snap(item.h);
          el.style.left = item.x + 'px'; el.style.top = item.y + 'px';
          el.style.width = item.w + 'px'; el.style.height = item.h + 'px';
        }
        function onUp() {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          commit();
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    });
  }

  function makeDraggable(el, item) {
    el.addEventListener('mousedown', e => {
      if (e.target.closest('.rh')) return;
      selectItem(item.id);
      const isEditable = e.target.isContentEditable;
      if (isEditable && document.activeElement === e.target) return;
      e.preventDefault();
      bringToFront(el, item);
      el.classList.add('dragging');
      const startX = e.clientX, startY = e.clientY;
      const startLeft = item.x, startTop = item.y;
      function onMove(ev) {
        item.x = snap(startLeft + (ev.clientX - startX) / scale);
        item.y = snap(startTop + (ev.clientY - startY) / scale);
        el.style.left = item.x + 'px';
        el.style.top = item.y + 'px';
      }
      function onUp() {
        el.classList.remove('dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        commit();
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }

  function renderItem(item) {
    const el = document.createElement('div');
    el.className = 'item';
    el.style.left = item.x + 'px';
    el.style.top = item.y + 'px';
    el.style.width = item.w + 'px';
    el.style.height = item.h + 'px';
    el.style.zIndex = item.z;
    el.style.border = borderStyleFor(item);
    el.dataset.id = item.id;

    if (item.type === 'sticky' || item.type === 'text') {
      const contentEl = document.createElement('div');
      contentEl.className = 'content';
      contentEl.contentEditable = 'true';
      contentEl.spellcheck = false;
      contentEl.innerHTML = item.content || '';
      contentEl.addEventListener('input', () => { item.content = contentEl.innerHTML; save(); });
      contentEl.addEventListener('blur', () => commit());
      if (item.type === 'sticky') {
        contentEl.classList.add('sticky');
        contentEl.style.background = item.color || '#fff59d';
      } else {
        contentEl.classList.add('text-item');
        if (item.bgColor) contentEl.style.background = item.bgColor;
      }
      contentEl.style.fontSize = (item.fontSize || defaultFontSize(item.type)) + 'px';
      if (item.fontFamily && item.fontFamily !== 'inherit') contentEl.style.fontFamily = item.fontFamily;
      if (item.textColor) contentEl.style.color = item.textColor;
      el.appendChild(contentEl);
      el.addEventListener('dblclick', e => { e.stopPropagation(); contentEl.focus(); placeCaretAtEnd(contentEl); });
    } else if (item.type === 'image') {
      el.classList.add('image-item');
      const img = document.createElement('img');
      img.src = item.content;
      img.draggable = false;
      el.appendChild(img);
    }

    makeDraggable(el, item);
    makeResizeHandles(el, item);
    el.addEventListener('contextmenu', e => {
      e.preventDefault(); e.stopPropagation();
      selectItem(item.id);
      showCtxMenu(e.clientX, e.clientY, item.id);
    });
    canvas.appendChild(el);
    return el;
  }

  function addItem(partial) {
    const centerX = (viewport.scrollLeft + viewport.clientWidth / 2) / scale - (partial.w || 200) / 2;
    const centerY = (viewport.scrollTop + viewport.clientHeight / 2) / scale - (partial.h || 150) / 2;
    const item = Object.assign({ id: uid(), x: centerX, y: centerY, w: 200, h: 150, z: nextZ++ }, partial);
    items.push(item);
    const el = renderItem(item);
    commit();
    if (['sticky', 'text'].includes(item.type)) {
      const contentEl = el.querySelector('.content');
      if (contentEl) { contentEl.focus(); placeCaretAtEnd(contentEl); }
    }
  }

  function placeCaretAtEnd(el) {
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }

  // ---------- Drawing ----------
  const drawCanvas = document.getElementById('drawCanvas');
  const dctx = drawCanvas.getContext('2d');
  const DRAW_DPR = Math.min(Math.max(window.devicePixelRatio || 1, 1), 3);
  drawCanvas.width = 3000 * DRAW_DPR;
  drawCanvas.height = 2000 * DRAW_DPR;
  dctx.scale(DRAW_DPR, DRAW_DPR);

  let currentStroke = null;
  let penColor = document.getElementById('penColor').value;
  let penSize = parseInt(document.getElementById('penSizeInput').value, 10) || 4;

  function updateSizePreview() {
    const preview = document.getElementById('sizePreview');
    const effectiveSize = eraseMode ? Math.max(penSize * 3, 20) : penSize;
    const displaySize = Math.max(4, Math.min(effectiveSize * 0.65, 30));
    preview.style.width = displaySize + 'px';
    preview.style.height = displaySize + 'px';
    preview.style.background = eraseMode ? 'rgba(239,100,100,0.85)' : penColor;
  }

  function getCanvasPoint(e) {
    const rect = canvas.getBoundingClientRect();
    return { x: (e.clientX - rect.left) / scale, y: (e.clientY - rect.top) / scale };
  }

  function strokeCtxSetup(ctx, stroke) {
    ctx.globalCompositeOperation = stroke.erase ? 'destination-out' : 'source-over';
    ctx.strokeStyle = stroke.color;
    ctx.fillStyle = stroke.color;
    ctx.lineWidth = stroke.width;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }

  function drawStroke(stroke) {
    if (!stroke.points.length) return;
    dctx.save();
    strokeCtxSetup(dctx, stroke);
    if (stroke.points.length === 1) {
      const [x, y] = stroke.points[0];
      dctx.beginPath();
      dctx.arc(x, y, stroke.width / 2, 0, Math.PI * 2);
      dctx.fill();
    } else {
      dctx.beginPath();
      dctx.moveTo(stroke.points[0][0], stroke.points[0][1]);
      for (let i = 1; i < stroke.points.length; i++) dctx.lineTo(stroke.points[i][0], stroke.points[i][1]);
      dctx.stroke();
    }
    dctx.restore();
  }

  function redrawStrokes() {
    dctx.clearRect(0, 0, 3000, 2000);
    strokes.forEach(drawStroke);
  }

  // ---------- Draw cursor ----------
  const drawCursorEl = document.getElementById('drawCursor');

  function styleDrawCursor() {
    const effectiveSize = eraseMode ? Math.max(penSize * 3, 20) : penSize;
    const px = Math.max(4, effectiveSize * scale);
    drawCursorEl.style.width = px + 'px';
    drawCursorEl.style.height = px + 'px';
    if (eraseMode) {
      drawCursorEl.style.background = 'rgba(239,68,68,0.12)';
      drawCursorEl.style.border = '1.5px solid rgba(239,68,68,0.85)';
    } else {
      const hex = penColor;
      drawCursorEl.style.background = hex + '33';
      drawCursorEl.style.border = `1.5px solid ${hex}`;
    }
  }

  function showDrawCursor(visible) {
    drawCursorEl.style.display = visible ? 'block' : 'none';
    drawCanvas.classList.toggle('hide-cursor', visible);
  }

  drawCanvas.addEventListener('pointerenter', e => {
    if (!drawMode && !eraseMode) return;
    styleDrawCursor();
    drawCursorEl.style.left = e.clientX + 'px';
    drawCursorEl.style.top = e.clientY + 'px';
    showDrawCursor(true);
  });
  drawCanvas.addEventListener('pointerleave', () => showDrawCursor(false));
  drawCanvas.addEventListener('pointermove', e => {
    if (!drawMode && !eraseMode) return;
    drawCursorEl.style.left = e.clientX + 'px';
    drawCursorEl.style.top = e.clientY + 'px';
  });

  function setDrawMode(on) {
    drawMode = on;
    if (on) {
      // Turning on draw — disable erase
      eraseMode = false;
      document.getElementById('toggleEraser').classList.remove('active');
    } else {
      endStroke();
      if (!eraseMode) showDrawCursor(false);
    }
    document.getElementById('toggleDraw').classList.toggle('active', drawMode);
    drawCanvas.classList.toggle('active', drawMode || eraseMode);
    deselectAll();
    styleDrawCursor();
    updateActivityBar();
  }

  function setEraseMode(on) {
    eraseMode = on;
    if (on) {
      // Turning on erase — disable draw
      drawMode = false;
      document.getElementById('toggleDraw').classList.remove('active');
    } else {
      endStroke();
      if (!drawMode) showDrawCursor(false);
    }
    document.getElementById('toggleEraser').classList.toggle('active', eraseMode);
    drawCanvas.classList.toggle('active', drawMode || eraseMode);
    deselectAll();
    styleDrawCursor();
    updateActivityBar();
  }

  drawCanvas.addEventListener('pointerdown', e => {
    if (!drawMode && !eraseMode) return;
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    e.preventDefault();
    drawCanvas.setPointerCapture(e.pointerId);
    const pt = getCanvasPoint(e);
    currentStroke = {
      color: penColor,
      width: eraseMode ? Math.max(penSize * 3, 20) : penSize,
      erase: eraseMode,
      points: [[pt.x, pt.y]],
    };
  });

  drawCanvas.addEventListener('contextmenu', e => { if (drawMode || eraseMode) e.preventDefault(); });

  let minimapRafId = null;
  drawCanvas.addEventListener('pointermove', e => {
    if ((!drawMode && !eraseMode) || !currentStroke) return;
    const pt = getCanvasPoint(e);
    const pts = currentStroke.points;
    const last = pts[pts.length - 1];
    dctx.save();
    strokeCtxSetup(dctx, currentStroke);
    dctx.beginPath();
    dctx.moveTo(last[0], last[1]);
    dctx.lineTo(pt.x, pt.y);
    dctx.stroke();
    dctx.restore();
    pts.push([pt.x, pt.y]);
    // Throttle minimap updates to one per animation frame
    if (!minimapRafId) minimapRafId = requestAnimationFrame(() => { updateMinimap(); minimapRafId = null; });
  });

  function endStroke(e) {
    if (!currentStroke) return;
    if (e && e.pointerId != null && drawCanvas.hasPointerCapture(e.pointerId)) drawCanvas.releasePointerCapture(e.pointerId);
    if (currentStroke.points.length === 1) drawStroke(currentStroke);
    strokes.push(currentStroke);
    currentStroke = null;
    commit();
  }

  drawCanvas.addEventListener('pointerup', endStroke);
  drawCanvas.addEventListener('pointercancel', endStroke);
  drawCanvas.addEventListener('lostpointercapture', endStroke);

  document.getElementById('toggleDraw').addEventListener('click', () => { setDrawMode(!drawMode); updateSizePreview(); });
  document.getElementById('toggleEraser').addEventListener('click', () => { setEraseMode(!eraseMode); updateSizePreview(); });
  document.getElementById('penColor').addEventListener('input', e => { penColor = e.target.value; updateSizePreview(); styleDrawCursor(); });
  document.getElementById('penSizeInput').addEventListener('input', e => { penSize = Math.max(1, parseInt(e.target.value, 10) || 4); updateSizePreview(); styleDrawCursor(); });

  document.getElementById('clearDrawing').addEventListener('click', () => {
    if (!strokes.length) return;
    showConfirm({
      icon: '🧹',
      title: 'Clear Drawing?',
      message: 'All drawing strokes will be removed. This cannot be undone.',
      confirmLabel: 'Clear Drawing',
    }, () => { strokes = []; redrawStrokes(); commit(); });
  });

  // ---------- Checklist ----------
  function loadChecklist() {
    try {
      const rawItems = localStorage.getItem(CHECKLIST_ITEMS_KEY);
      if (rawItems) checklistItems = JSON.parse(rawItems);
      const rawChecked = localStorage.getItem(CHECKLIST_STORAGE_KEY);
      if (rawChecked) checklistChecked = JSON.parse(rawChecked);
    } catch (e) { console.error('Failed to load checklist', e); }
  }

  function saveChecklist() {
    localStorage.setItem(CHECKLIST_STORAGE_KEY, JSON.stringify(checklistChecked));
    localStorage.setItem(CHECKLIST_ITEMS_KEY, JSON.stringify(checklistItems));
  }

  function updateChecklistProgress() {
    const total = checklistItems.length;
    const done = checklistItems.reduce((count, _, i) => count + (checklistChecked[i] ? 1 : 0), 0);
    document.getElementById('checklistProgressText').textContent = `${done}/${total}`;
    document.getElementById('checklistProgressFill').style.width = total ? `${(done / total) * 100}%` : '0%';
  }

  function renderChecklist() {
    const ul = document.getElementById('checklistItems');
    ul.innerHTML = '';
    checklistItems.forEach((text, i) => {
      const li = document.createElement('li');
      if (checklistChecked[i]) li.classList.add('checked');

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = !!checklistChecked[i];
      checkbox.addEventListener('change', () => {
        checklistChecked[i] = checkbox.checked;
        li.classList.toggle('checked', checkbox.checked);
        saveChecklist();
        updateChecklistProgress();
      });

      const span = document.createElement('span');
      span.textContent = text;

      // Edit button
      const editBtn = document.createElement('button');
      editBtn.className = 'checklist-item-btn';
      editBtn.title = 'Edit';
      editBtn.textContent = '✏️';
      editBtn.addEventListener('click', () => {
        // Replace span with input
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'item-edit-input';
        input.value = checklistItems[i];
        li.replaceChild(input, span);
        input.focus();
        input.select();
        function commit() {
          const val = input.value.trim();
          if (val) { checklistItems[i] = val; saveChecklist(); }
          renderChecklist();
          updateChecklistProgress();
        }
        input.addEventListener('blur', commit);
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') { input.blur(); }
          if (e.key === 'Escape') { checklistItems[i] = text; renderChecklist(); }
        });
      });

      // Delete button
      const deleteBtn = document.createElement('button');
      deleteBtn.className = 'checklist-item-btn delete';
      deleteBtn.title = 'Delete';
      deleteBtn.textContent = '✕';
      deleteBtn.addEventListener('click', () => {
        checklistItems.splice(i, 1);
        // Shift checked states
        const newChecked = {};
        checklistItems.forEach((_, j) => {
          const oldIdx = j < i ? j : j + 1;
          if (checklistChecked[oldIdx]) newChecked[j] = true;
        });
        checklistChecked = newChecked;
        saveChecklist();
        renderChecklist();
        updateChecklistProgress();
      });

      li.appendChild(checkbox);
      li.appendChild(span);
      li.appendChild(editBtn);
      li.appendChild(deleteBtn);
      ul.appendChild(li);
    });
    updateChecklistProgress();
  }

  document.getElementById('checklistHandle').addEventListener('click', () => {
    document.getElementById('checklistDrawer').classList.toggle('open');
  });

  document.getElementById('checklistAddBtn').addEventListener('click', () => {
    const input = document.getElementById('checklistAddInput');
    const val = input.value.trim();
    if (!val) return;
    checklistItems.push(val);
    saveChecklist();
    renderChecklist();
    updateChecklistProgress();
    input.value = '';
    input.focus();
  });

  document.getElementById('checklistAddInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('checklistAddBtn').click();
  });

  // ---------- Sticky color swatch sync ----------
  const stickyColorInput = document.getElementById('stickyColor');
  const stickyColorSwatch = document.getElementById('stickyColorSwatch');
  stickyColorSwatch.style.background = stickyColorInput.value;
  stickyColorInput.addEventListener('input', e => {
    stickyColorSwatch.style.background = e.target.value;
  });

  // ---------- Toolbar actions ----------
  document.getElementById('addSticky').addEventListener('click', () => {
    addItem({ type: 'sticky', w: 220, h: 180, color: stickyColorInput.value, content: '' });
  });

  document.getElementById('addText').addEventListener('click', () => {
    addItem({ type: 'text', w: 220, h: 60, fontSize: 16, content: '' });
  });

  document.getElementById('bgColor').addEventListener('input', e => { bgColor = e.target.value; applyBackground(); save(); });
  document.getElementById('bgColor').addEventListener('change', () => commit());

  document.getElementById('fontFamily').addEventListener('change', e => {
    const item = items.find(i => i.id === selectedId);
    if (!item) return;
    item.fontFamily = e.target.value;
    const contentEl = canvas.querySelector(`[data-id="${item.id}"] .content`);
    if (contentEl) contentEl.style.fontFamily = item.fontFamily === 'inherit' ? '' : item.fontFamily;
    commit();
  });

  document.getElementById('fontSizeInput').addEventListener('input', e => {
    const item = items.find(i => i.id === selectedId);
    if (!item) return;
    const val = parseInt(e.target.value, 10);
    if (!val) return;
    item.fontSize = val;
    const contentEl = canvas.querySelector(`[data-id="${item.id}"] .content`);
    if (contentEl) contentEl.style.fontSize = val + 'px';
    save();
  });
  document.getElementById('fontSizeInput').addEventListener('change', () => { if (selectedId) commit(); });

  document.getElementById('borderColor').addEventListener('input', e => {
    const item = items.find(i => i.id === selectedId);
    if (!item) return;
    item.borderColor = e.target.value;
    const el = canvas.querySelector(`[data-id="${item.id}"]`);
    if (el) el.style.border = borderStyleFor(item);
    save();
  });
  document.getElementById('borderColor').addEventListener('change', () => { if (selectedId) commit(); });

  document.getElementById('borderWidthInput').addEventListener('input', e => {
    const item = items.find(i => i.id === selectedId);
    if (!item) return;
    item.borderWidth = Math.max(0, parseInt(e.target.value, 10) || 0);
    const el = canvas.querySelector(`[data-id="${item.id}"]`);
    if (el) el.style.border = borderStyleFor(item);
    save();
  });
  document.getElementById('borderWidthInput').addEventListener('change', () => { if (selectedId) commit(); });

  document.getElementById('addBgImageBtn').addEventListener('click', () => document.getElementById('bgImageInput').click());
  document.getElementById('bgImageInput').addEventListener('change', e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { bgImage = reader.result; applyBackground(); commit(); };
    reader.readAsDataURL(file);
    e.target.value = '';
  });
  document.getElementById('removeBgImageBtn').addEventListener('click', () => { bgImage = null; applyBackground(); commit(); });

  document.getElementById('addImageBtn').addEventListener('click', () => document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change', e => {
    Array.from(e.target.files || []).forEach(file => {
      const reader = new FileReader();
      reader.onload = () => addItem({ type: 'image', w: 260, h: 220, content: reader.result });
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  });

  document.getElementById('clearBoard').addEventListener('click', () => {
    if (!items.length && !strokes.length) return;
    showConfirm({
      icon: '🗑️',
      title: 'Clear Entire Board?',
      message: 'All sticky notes, images, text, and drawings will be permanently removed.',
      confirmLabel: 'Clear Board',
    }, () => {
      items = [];
      nextZ = 1;
      strokes = [];
      canvas.querySelectorAll('.item').forEach(el => el.remove());
      redrawStrokes();
      deselectAll();
      commit();
    });
  });

  document.getElementById('undoBtn').addEventListener('click', undo);
  document.getElementById('redoBtn').addEventListener('click', redo);

  // ---------- Selection & keyboard ----------
  viewport.addEventListener('mousedown', e => { if (!e.target.closest('.item')) deselectAll(); });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && (drawMode || eraseMode)) { setDrawMode(false); setEraseMode(false); return; }
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z') {
      e.preventDefault();
      if (e.shiftKey) redo(); else undo();
      return;
    }
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'y') { e.preventDefault(); redo(); return; }
    if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'd') {
      if (selectedId) { e.preventDefault(); duplicateItem(selectedId); }
      return;
    }
    if (e.key !== 'Delete' && e.key !== 'Backspace') return;
    if (!selectedId) return;
    const active = document.activeElement;
    const editingSelected = active && active.isContentEditable && active.closest('.item') && active.closest('.item').dataset.id === selectedId;
    if (editingSelected) return;
    e.preventDefault();
    removeItemById(selectedId);
  });

  // ---------- Snap ----------
  document.getElementById('snapBtn').addEventListener('click', () => {
    snapGrid = !snapGrid;
    document.getElementById('snapBtn').classList.toggle('active', snapGrid);
  });

  // ---------- Fullscreen ----------
  const fsBtn = document.getElementById('fullscreenBtn');
  function updateFsBtn() {
    const isFs = !!document.fullscreenElement;
    fsBtn.textContent = isFs ? '✕ Exit' : '⛶ Fullscreen';
    fsBtn.classList.toggle('active', isFs);
  }
  fsBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
    else document.exitFullscreen();
  });
  document.addEventListener('fullscreenchange', updateFsBtn);

  // ---------- Minimap ----------
  const minimapCanvas = document.getElementById('minimapCanvas');
  const mctx = minimapCanvas.getContext('2d');
  const MM_W = 200, MM_H = 133, MM_S = MM_W / 3000;

  // Offscreen canvas for stroke layer — destination-out erases ink here,
  // not the minimap background, so erased areas go transparent (not black)
  const strokeOffscreen = document.createElement('canvas');
  strokeOffscreen.width = MM_W;
  strokeOffscreen.height = MM_H;
  const sctx = strokeOffscreen.getContext('2d');

  function updateMinimap() {
    mctx.clearRect(0, 0, MM_W, MM_H);
    mctx.fillStyle = bgImage ? '#888' : bgColor;
    mctx.fillRect(0, 0, MM_W, MM_H);

    // Items
    for (const item of items) {
      if (item.type === 'sticky') mctx.fillStyle = item.color || '#fff59d';
      else if (item.type === 'text') mctx.fillStyle = item.bgColor || '#fff';
      else mctx.fillStyle = '#aaa';
      mctx.fillRect(item.x * MM_S, item.y * MM_S, item.w * MM_S, item.h * MM_S);
    }

    // Strokes — rendered on offscreen canvas so destination-out punches through
    // ink only, not the minimap background (which would show as black holes)
    const allStrokes = currentStroke ? [...strokes, currentStroke] : strokes;
    sctx.clearRect(0, 0, MM_W, MM_H);
    for (const stroke of allStrokes) {
      if (!stroke.points.length) continue;
      sctx.save();
      sctx.globalCompositeOperation = stroke.erase ? 'destination-out' : 'source-over';
      sctx.strokeStyle = stroke.color;
      sctx.fillStyle = stroke.color;
      sctx.lineWidth = Math.max(0.5, stroke.width * MM_S);
      sctx.lineCap = 'round';
      sctx.lineJoin = 'round';
      if (stroke.points.length === 1) {
        const [x, y] = stroke.points[0];
        sctx.beginPath();
        sctx.arc(x * MM_S, y * MM_S, Math.max(0.5, stroke.width * MM_S / 2), 0, Math.PI * 2);
        sctx.fill();
      } else {
        sctx.beginPath();
        sctx.moveTo(stroke.points[0][0] * MM_S, stroke.points[0][1] * MM_S);
        for (let i = 1; i < stroke.points.length; i++) {
          sctx.lineTo(stroke.points[i][0] * MM_S, stroke.points[i][1] * MM_S);
        }
        sctx.stroke();
      }
      sctx.restore();
    }
    // Composite the stroke layer — transparent (erased) areas reveal background/items
    mctx.drawImage(strokeOffscreen, 0, 0);

    // Viewport indicator
    const vx = (viewport.scrollLeft / scale) * MM_S;
    const vy = (viewport.scrollTop / scale) * MM_S;
    const vw = (viewport.clientWidth / scale) * MM_S;
    const vh = (viewport.clientHeight / scale) * MM_S;
    mctx.fillStyle = 'rgba(123,92,208,0.15)';
    mctx.fillRect(vx, vy, vw, vh);
    mctx.strokeStyle = 'rgba(123,92,208,0.9)';
    mctx.lineWidth = 1.5;
    mctx.strokeRect(vx, vy, vw, vh);
  }

  viewport.addEventListener('scroll', updateMinimap);

  // Minimap minimize toggle
  document.getElementById('minimapToggle').addEventListener('click', () => {
    const mm = document.getElementById('minimap');
    const btn = document.getElementById('minimapToggle');
    const minimized = mm.classList.toggle('minimized');
    btn.textContent = minimized ? '+' : '−';
    btn.title = minimized ? 'Expand minimap' : 'Minimize minimap';
  });

  // ---------- Fill color (sticky + text) ----------
  document.getElementById('itemFillColor').addEventListener('input', e => {
    const item = items.find(i => i.id === selectedId);
    if (!item) return;
    if (item.type === 'sticky') {
      item.color = e.target.value;
      const contentEl = canvas.querySelector(`[data-id="${item.id}"] .content`);
      if (contentEl) contentEl.style.background = item.color;
    } else if (item.type === 'text') {
      item.bgColor = e.target.value;
      const contentEl = canvas.querySelector(`[data-id="${item.id}"] .content`);
      if (contentEl) contentEl.style.background = item.bgColor;
    }
    save();
    updateMinimap();
  });
  document.getElementById('itemFillColor').addEventListener('change', () => commit());

  // ---------- Text color ----------
  document.getElementById('itemTextColor').addEventListener('input', e => {
    const item = items.find(i => i.id === selectedId);
    if (!item) return;
    item.textColor = e.target.value;
    const contentEl = canvas.querySelector(`[data-id="${item.id}"] .content`);
    if (contentEl) contentEl.style.color = item.textColor;
    save();
  });
  document.getElementById('itemTextColor').addEventListener('change', () => { if (selectedId) commit(); });

  // ---------- Zoom ----------
  const zoomLabel = document.getElementById('zoomLabel');
  function applyZoom() {
    canvas.style.transform = `scale(${scale})`;
    zoomLabel.textContent = Math.round(scale * 100) + '%';
    updateMinimap();
    styleDrawCursor();
  }
  document.getElementById('zoomIn').addEventListener('click', () => { scale = Math.min(2, scale + 0.1); applyZoom(); });
  document.getElementById('zoomOut').addEventListener('click', () => { scale = Math.max(0.3, scale - 0.1); applyZoom(); });
  zoomLabel.addEventListener('click', () => { scale = 1; applyZoom(); viewport.scrollTo({ left: 0, top: 0, behavior: 'smooth' }); });

  // ---------- Init ----------
  load();
  applyBackground();
  updateFormatControls();
  loadChecklist();
  renderChecklist();
  history = [snapshot()];
  historyIndex = 0;
  updateUndoRedoButtons();
  updateActivityBar();
  updateSizePreview();
  applyZoom();
  updateMinimap();
  viewport.scrollLeft = (canvas.offsetWidth - viewport.clientWidth) / 4;
  viewport.scrollTop = (canvas.offsetHeight - viewport.clientHeight) / 4;
})();
</script>
</body>
</html>
